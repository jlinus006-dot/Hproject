<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="index.html" id="loginform" method="get">
        <div class="login-container">
            <!-- title and logo -->
            <h1>Login</h1>
            <!-- username and password -->
            <input class="login-input" type="text" placeholder="username" name="username">
            <input class="login-input" type="password" placeholder="password" name="password">

            <!--submit buttom-->
            <button class="btn" ><a href="index.html">Login</a></button>
           
            <!--switch to register-->
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </form>
</body>
</html>
